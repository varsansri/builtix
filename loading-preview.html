<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biyatrix — Loading Animations</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060e06;
    --surface: #0e160e;
    --border: #1a261a;
    --green: #00ff00;
    --grey: rgba(255,255,255,0.35);
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: "Inter", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    gap: 48px;
    padding: 56px 24px;
  }

  .header {
    display: flex; align-items: center; gap: 12px;
  }
  .header-badge {
    width: 40px; height: 40px;
    background: var(--green);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  /* Show just the B (right half of the logo image) */
  .header-badge img {
    width: 200%;
    height: 100%;
    object-fit: cover;
    object-position: right center;
    filter: hue-rotate(0deg) saturate(0) brightness(0);
  }
  .header-title {
    color: var(--white);
    font-size: 18px; font-weight: 700; letter-spacing: 3px;
  }
  .header-sub {
    color: var(--grey);
    font-size: 11px; letter-spacing: 1.5px; margin-top: 3px;
  }

  /* ─── Row of cards ─── */
  .row {
    display: flex; gap: 24px;
    justify-content: center; flex-wrap: wrap; align-items: stretch;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 20px 28px;
    display: flex; flex-direction: column;
    align-items: center; gap: 28px;
    width: 180px;
  }

  .label .name {
    color: var(--white);
    font-size: 13px; font-weight: 600; text-align: center;
  }
  .label .desc {
    color: var(--grey);
    font-size: 10px; margin-top: 5px;
    line-height: 1.6; text-align: center;
  }

  /* ─── THE LOGO ─── 
     The PNG has both characters (left+right) in a 500x500 square.
     We show only the right half (the B) using overflow+positioning.
  ─── */
  .logo-wrap {
    position: relative;
    overflow: hidden;
  }
  .logo-img {
    display: block;
    /* doubled width, positioned to right → shows right half (the B) */
    position: relative;
    filter: hue-rotate(-60deg) saturate(3) brightness(1.1) contrast(1.2);
  }

  /* ═══════════════════════════════
     STAGE — positions animation layers
  ═══════════════════════════════ */
  .stage {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  /* ═══════════════════════════════
     ANIM 1 — ARC SPIN
     Bright conic-gradient arc orbits B
  ═══════════════════════════════ */
  .stage1 {
    width: 130px; height: 130px;
  }

  .arc {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      transparent   0%,
      transparent  15%,
      #00ff0008    30%,
      #00ff0055    50%,
      #00ff00cc    68%,
      #00ff00      76%,
      #ffffff88    80%,
      #00ff00bb    84%,
      transparent  92%,
      transparent 100%
    );
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff calc(100% - 3px));
    mask:         radial-gradient(farthest-side, transparent calc(100% - 4px), #fff calc(100% - 3px));
    animation: arc-spin 1.1s linear infinite;
    filter: drop-shadow(0 0 6px #00ff00aa);
  }

  @keyframes arc-spin { to { transform: rotate(360deg); } }

  .glow1 {
    animation: pulse1 1.1s ease-in-out infinite;
    position: relative; z-index: 2;
  }
  @keyframes pulse1 {
    0%,100% { filter: hue-rotate(-60deg) saturate(3) brightness(0.95) contrast(1.2) drop-shadow(0 0 4px #00ff0055); }
    50%      { filter: hue-rotate(-60deg) saturate(3) brightness(1.25) contrast(1.2) drop-shadow(0 0 18px #00ff00cc); }
  }

  /* ═══════════════════════════════
     ANIM 2 — SONAR PULSE
     Angular rings radiate from logo
  ═══════════════════════════════ */
  .stage2 {
    width: 130px; height: 130px;
  }

  .ring {
    position: absolute;
    width: 72px; height: 82px;
    border-radius: 12px;
    border: 2px solid var(--green);
    box-shadow: 0 0 8px #00ff0066, inset 0 0 8px #00ff0022;
    opacity: 0;
    animation: ring-out 2.2s ease-out infinite;
  }
  .ring:nth-child(2) { animation-delay: 0.73s; }
  .ring:nth-child(3) { animation-delay: 1.46s; }

  @keyframes ring-out {
    0%   { transform: scale(0.75); opacity: 1; }
    100% { transform: scale(2.4);  opacity: 0; box-shadow: 0 0 0px transparent; }
  }

  .glow2 {
    position: relative; z-index: 2;
    animation: pulse2 2.2s ease-in-out infinite;
  }
  @keyframes pulse2 {
    0%,100% { filter: hue-rotate(-60deg) saturate(3) brightness(0.9) contrast(1.2) drop-shadow(0 0 5px #00ff0066); }
    30%      { filter: hue-rotate(-60deg) saturate(3) brightness(1.4) contrast(1.3) drop-shadow(0 0 22px #00ff00) drop-shadow(0 0 44px #00ff0044); }
  }

  /* ═══════════════════════════════
     ANIM 3 — POWER CHARGE
     Logo dims then fires a bright
     flash + expanding burst ring
  ═══════════════════════════════ */
  .stage3 {
    width: 130px; height: 130px;
  }

  .burst {
    position: absolute;
    width: 72px; height: 82px;
    border-radius: 12px;
    background: transparent;
    border: 3px solid #00ff00;
    opacity: 0;
    animation: burst-out 2.8s cubic-bezier(0.2, 0.8, 0.4, 1) infinite;
    filter: blur(1px);
  }
  .burst2 {
    position: absolute;
    width: 72px; height: 82px;
    border-radius: 12px;
    background: #00ff0012;
    border: 1px solid #00ff0066;
    opacity: 0;
    animation: burst-out 2.8s cubic-bezier(0.2, 0.8, 0.4, 1) 0.15s infinite;
  }

  @keyframes burst-out {
    0%   { transform: scale(0.9);  opacity: 0; }
    5%   { opacity: 1; }
    100% { transform: scale(2.8);  opacity: 0; }
  }

  .glow3 {
    position: relative; z-index: 2;
    animation: charge 2.8s ease-in-out infinite;
  }
  @keyframes charge {
    0%   { filter: hue-rotate(-60deg) saturate(3) brightness(0.5) contrast(1.1); }
    60%  { filter: hue-rotate(-60deg) saturate(3) brightness(0.6) contrast(1.1); }
    75%  { filter: hue-rotate(-60deg) saturate(4) brightness(2.0) contrast(1.5) drop-shadow(0 0 30px #00ff00) drop-shadow(0 0 60px #00ff0066); }
    85%  { filter: hue-rotate(-60deg) saturate(3) brightness(1.1) contrast(1.2) drop-shadow(0 0 12px #00ff0088); }
    100% { filter: hue-rotate(-60deg) saturate(3) brightness(0.5) contrast(1.1); }
  }
</style>
</head>
